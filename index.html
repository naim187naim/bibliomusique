<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bibliomusique | Urban Mobile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">
        <div class="search-box">
            <input type="text" id="query" placeholder="UN MOT, UN SON...">
            <div class="buttons">
                <button id="btn-search">GO</button>
                <button id="btn-voice">🎤</button>
            </div>
        </div>

        <div id="player-ui" class="hidden">
            <div class="cover-wrapper">
                <img src="" id="album-cover" alt="Cover">
            </div>
            
            <div class="info-box">
                <h1 id="track-title">CHARGEMENT...</h1>
                <h2 id="track-artist">ARTISTE</h2>
                <audio id="audio-remote" controls></audio>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
